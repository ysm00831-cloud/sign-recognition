<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>문장 모드</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#667eea">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="수화 인식기">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0f0f1a;color:#fff;font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;
       display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:1rem}
  header{width:100%;max-width:700px;display:flex;align-items:center;gap:1rem;margin-bottom:1rem}
  header a{color:#aaa;text-decoration:none;font-size:1.2rem}
  header h1{font-size:1.3rem;flex:1}
  #res-select{background:#1a1a2e;color:#aaa;border:1px solid #333;border-radius:8px;
    padding:4px 8px;font-size:.8rem;cursor:pointer}
  #video-wrap{position:relative;width:100%;max-width:700px;border-radius:16px;overflow:hidden;background:#000}
  #video{width:100%;display:block;transform:scaleX(-1)}
  #canvas{position:absolute;top:0;left:0;width:100%;height:100%;transform:scaleX(-1)}
  #live-label{position:absolute;top:12px;left:50%;transform:translateX(-50%);
    background:rgba(0,0,0,.6);padding:4px 16px;border-radius:20px;font-size:1rem;
    color:#7effd4;white-space:nowrap;max-width:90%;text-align:center}
  #frame-bar-wrap{position:absolute;bottom:8px;left:8px;right:8px;height:6px;
    background:rgba(255,255,255,.15);border-radius:3px;overflow:hidden}
  #frame-bar{height:100%;width:0%;background:#38ef7d;transition:width .1s}
  #output-wrap{width:100%;max-width:700px;margin-top:1rem;background:#1a1a2e;
    border-radius:12px;padding:1rem;min-height:80px}
  #output-wrap label{color:#aaa;font-size:.8rem;margin-bottom:.4rem;display:block}
  #output{font-size:1.8rem;word-break:break-all;line-height:1.5;min-height:2.5rem}
  #word-list-wrap{width:100%;max-width:700px;margin-top:1rem;background:#1a1a2e;
    border-radius:12px;padding:1rem}
  #word-list-wrap label{color:#aaa;font-size:.8rem;margin-bottom:.6rem;display:block}
  #word-list{display:flex;flex-wrap:wrap;gap:.4rem}
  .word-tag{background:#11998e33;border:1px solid #11998e66;border-radius:20px;
    padding:3px 12px;font-size:.8rem;color:#38ef7d}
  .controls{width:100%;max-width:700px;display:flex;gap:.5rem;margin-top:.8rem;flex-wrap:wrap}
  button{flex:1;min-width:80px;padding:.6rem;border:none;border-radius:10px;
         font-size:.9rem;cursor:pointer;font-family:inherit}
  .btn-clear{background:#e74c3c;color:#fff}
  .btn-delete{background:#e67e22;color:#fff}
  .btn-flip{background:#8e44ad;color:#fff}
  #status{margin-top:.5rem;font-size:.75rem;color:#666}
  #loading{position:fixed;inset:0;background:#0f0f1a;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:1rem;z-index:100}
  .spinner{width:48px;height:48px;border:4px solid #333;border-top-color:#38ef7d;
    border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><p>모델 로딩 중...</p></div>

<header>
  <a href="index.html">← 홈</a>
  <h1>💬 문장 모드</h1>
  <select id="res-select" onchange="changeResolution(this.value)">
    <option value="480">480p (권장)</option>
    <option value="720">720p (고화질)</option>
    <option value="240">240p (저사양)</option>
  </select>
</header>

<div id="video-wrap">
  <video id="video" playsinline autoplay muted></video>
  <canvas id="canvas"></canvas>
  <div id="live-label">손을 카메라에 보여주세요</div>
  <div id="frame-bar-wrap"><div id="frame-bar"></div></div>
</div>

<div id="output-wrap">
  <label>인식된 텍스트</label>
  <div id="output"></div>
</div>

<div id="word-list-wrap">
  <label>학습된 단어 목록</label>
  <div id="word-list"></div>
</div>

<div class="controls">
  <button class="btn-delete" onclick="deleteLast()">← 삭제</button>
  <button class="btn-clear"  onclick="clearAll()">전체 삭제</button>
  <button class="btn-flip"   onclick="flipCamera()">📷 전환</button>
</div>
<div id="status">모델 로딩 중...</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>

<script>
const video     = document.getElementById('video');
const canvas    = document.getElementById('canvas');
const ctx       = canvas.getContext('2d');
const liveEl    = document.getElementById('live-label');
const outputEl  = document.getElementById('output');
const statusEl  = document.getElementById('status');
const loadingEl = document.getElementById('loading');
const frameBar  = document.getElementById('frame-bar');
const wordList  = document.getElementById('word-list');

// 모바일 감지
const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

const RES = { '240':[320,240], '480':[640,480], '720':[1280,720] };
let curRes = isMobile ? '240' : '480';
let facingMode = 'user';
let stream = null;
let animFrameId = null;
let running = false;

document.addEventListener('DOMContentLoaded', () => {
  if(isMobile){ const sel=document.getElementById('res-select'); if(sel) sel.value='240'; }
});

// 특징 인덱스 (inference.py 와 동일)
const POSE_IDX = [0, 11, 12, 13, 14, 15, 16, 23, 24];
const FACE_IDX = [1, 133, 362, 61, 291];
const INPUT_SIZE = 112; // 손(84) + 포즈(18) + 얼굴(10)

let session = null, labels = [], seqLen = 20;
let committed = [], seqBuf = [], handVisible = false, handGoneTimer = null;
const CONF_THRESH = 0.50, HAND_GONE_MS = 400, MAX_FRAMES = 60;

// FaceMesh 최신 결과 저장
let latestFaceLm = null;

function render(){ outputEl.textContent = committed.join(' '); }
function deleteLast(){ committed.pop(); render(); }
function clearAll(){ committed = []; render(); }

// 112차원 특징 추출
function extractFeat(results){
  const leftLm  = results.leftHandLandmarks;
  const rightLm = results.rightHandLandmarks;
  const poseLm  = results.poseLandmarks;
  // FaceMesh 결과 우선, 없으면 Holistic faceLandmarks 사용
  const faceLm  = latestFaceLm || results.faceLandmarks || null;

  if(!leftLm && !rightLm) return null;

  // 정규화 기준: 포즈 어깨 중점+너비, 없으면 손목 기준
  let anchor, scale;
  if(poseLm){
    const ls = poseLm[11], rs = poseLm[12];
    anchor = [(ls.x + rs.x) / 2, (ls.y + rs.y) / 2];
    scale  = Math.sqrt((ls.x - rs.x) ** 2 + (ls.y - rs.y) ** 2) + 1e-6;
  } else {
    const src = leftLm || rightLm;
    anchor = [src[0].x, src[0].y];
    scale  = Math.sqrt((src[8].x - anchor[0]) ** 2 + (src[8].y - anchor[1]) ** 2) + 1e-6;
  }

  // 손 특징 (42점 × 2 = 84)
  const handFeat = lm => {
    if(!lm) return new Array(42).fill(0);
    return lm.flatMap(p => [(p.x - anchor[0]) / scale, (p.y - anchor[1]) / scale]);
  };

  // 포즈 상체 특징 (9점 × 2 = 18)
  const poseFeat = poseLm
    ? POSE_IDX.flatMap(i => [(poseLm[i].x - anchor[0]) / scale, (poseLm[i].y - anchor[1]) / scale])
    : new Array(18).fill(0);

  // 얼굴 핵심 특징 (5점 × 2 = 10)
  const faceFeat = faceLm
    ? FACE_IDX.flatMap(i => [(faceLm[i].x - anchor[0]) / scale, (faceLm[i].y - anchor[1]) / scale])
    : new Array(10).fill(0);

  return [...handFeat(leftLm), ...handFeat(rightLm), ...poseFeat, ...faceFeat]; // (112,)
}

async function runInference(){
  if(!session || seqBuf.length < 4){ liveEl.textContent = '동작이 너무 짧습니다'; return; }
  const T = seqBuf.length;
  const sampled = Array.from({length: seqLen}, (_, i) => seqBuf[Math.round(i * (T - 1) / (seqLen - 1))]);
  const flat    = new Float32Array(sampled.flat());
  const tensor  = new ort.Tensor('float32', flat, [1, seqLen, INPUT_SIZE]);
  const out     = await session.run({input: tensor});
  const logits  = out.output.data;
  const expV    = Array.from(logits).map(v => Math.exp(v));
  const sumE    = expV.reduce((a, b) => a + b, 0);
  const prob    = expV.map(v => v / sumE);
  const best    = prob.indexOf(Math.max(...prob));
  const conf    = prob[best];
  const label   = labels[best] || 'UNKNOWN';
  if(conf >= CONF_THRESH && label !== 'UNKNOWN'){
    liveEl.textContent = `${label}  (${(conf * 100).toFixed(0)}%)`;
    committed.push(label); render();
  } else {
    liveEl.textContent = '인식 실패 (신뢰도 낮음)';
  }
  seqBuf = []; frameBar.style.width = '0%';
}

// MediaPipe FaceMesh — 얼굴 랜드마크를 안정적으로 수집
const faceMesh = new FaceMesh({locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
faceMesh.setOptions({
  maxNumFaces: 1,
  refineLandmarks: false,
  minDetectionConfidence: 0.5,
  minTrackingConfidence: 0.5
});
faceMesh.onResults(results => {
  latestFaceLm = (results.multiFaceLandmarks && results.multiFaceLandmarks[0]) || null;
});

// MediaPipe Holistic — 손 + 포즈
const holistic = new Holistic({locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${f}`});
holistic.setOptions({
  modelComplexity: isMobile ? 0 : 1,
  smoothLandmarks: true,
  minDetectionConfidence: 0.5,
  minTrackingConfidence: 0.5
});

holistic.onResults(results => {
  canvas.width  = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const hasHand = results.leftHandLandmarks || results.rightHandLandmarks;

  if(hasHand){
    if(handGoneTimer){ clearTimeout(handGoneTimer); handGoneTimer = null; }
    handVisible = true;

    if(results.leftHandLandmarks){
      drawConnectors(ctx, results.leftHandLandmarks, HAND_CONNECTIONS, {color:'#38ef7d', lineWidth:2});
      drawLandmarks(ctx, results.leftHandLandmarks, {color:'#fff', lineWidth:1, radius:3});
    }
    if(results.rightHandLandmarks){
      drawConnectors(ctx, results.rightHandLandmarks, HAND_CONNECTIONS, {color:'#38ef7d', lineWidth:2});
      drawLandmarks(ctx, results.rightHandLandmarks, {color:'#fff', lineWidth:1, radius:3});
    }
    if(results.poseLandmarks){
      drawConnectors(ctx, results.poseLandmarks, POSE_CONNECTIONS, {color:'#44448888', lineWidth:1});
    }

    const feat = extractFeat(results);
    if(feat){
      seqBuf.push(feat);
      if(seqBuf.length > seqLen * 3) seqBuf = seqBuf.slice(-seqLen * 3);
    }
    frameBar.style.width = (Math.min(seqBuf.length, MAX_FRAMES) / MAX_FRAMES * 100) + '%';
    liveEl.textContent = `수집 중 (${seqBuf.length}프레임)`;

  } else {
    if(handVisible && !handGoneTimer){
      handGoneTimer = setTimeout(() => {
        handVisible = false; handGoneTimer = null;
        liveEl.textContent = '손을 카메라에 보여주세요';
        runInference();
      }, HAND_GONE_MS);
    }
  }
});

// camera_utils 없이 직접 getUserMedia 사용 (iOS Safari 호환)
async function startCamera(res){
  running = false;
  if(animFrameId){ cancelAnimationFrame(animFrameId); animFrameId = null; }
  if(stream){ stream.getTracks().forEach(t => t.stop()); stream = null; }

  const [w, h] = RES[res] || [640, 480];
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { width:{ideal:w}, height:{ideal:h}, facingMode:facingMode },
      audio: false
    });
    video.srcObject = stream;
    await new Promise(resolve => { video.onloadedmetadata = resolve; });
    await video.play();
    running = true;

    async function loop(){
      if(!running) return;
      if(video.readyState >= 2 && video.videoWidth > 0){
        await Promise.all([
          holistic.send({image: video}),
          faceMesh.send({image: video})
        ]);
      }
      animFrameId = requestAnimationFrame(loop);
    }
    loop();
    statusEl.textContent = `카메라 ${w}x${h}${isMobile?' (모바일)':''}`;
  } catch(e){
    statusEl.textContent = '카메라 오류: ' + e.message;
  }
}

function changeResolution(val){ curRes = val; startCamera(val); }

function flipCamera(){
  facingMode = facingMode === 'user' ? 'environment' : 'user';
  startCamera(curRes);
}

async function init(){
  const res  = await fetch('models/labels.json');
  const data = await res.json();
  labels = data.seq; seqLen = data.seq_len || 20;

  labels.forEach(lb => {
    const span = document.createElement('span');
    span.className = 'word-tag'; span.textContent = lb;
    wordList.appendChild(span);
  });

  session = await ort.InferenceSession.create('models/seq.onnx');
  loadingEl.style.display = 'none';
  startCamera(curRes);
}

init().catch(e => {
  statusEl.textContent = '오류: ' + e.message;
  loadingEl.innerHTML = `<p style="color:#e74c3c">오류: ${e.message}</p>`;
});
</script>
<script>if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js'); }</script>
</body>
</html>
