<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>문장 모드 — 수화 인식기</title>
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#667eea">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="수화 인식기">
<link rel="apple-touch-icon" href="/static/icons/icon-192.png">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0f0f1a;color:#fff;font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;
       display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:1rem}
  header{width:100%;max-width:700px;display:flex;align-items:center;gap:1rem;margin-bottom:1rem}
  header a{color:#aaa;text-decoration:none;font-size:1.2rem}
  header h1{font-size:1.3rem;flex:1}
  #res-select{background:#1a1a2e;color:#aaa;border:1px solid #333;border-radius:8px;
    padding:4px 8px;font-size:.8rem;cursor:pointer}
  #video-wrap{position:relative;width:100%;max-width:700px;border-radius:16px;overflow:hidden;background:#000}
  #video{width:100%;display:block;transform:scaleX(-1)}
  #canvas{position:absolute;top:0;left:0;width:100%;height:100%;transform:scaleX(-1)}
  #live-label{position:absolute;top:12px;left:50%;transform:translateX(-50%);
    background:rgba(0,0,0,.6);padding:4px 16px;border-radius:20px;font-size:1rem;
    color:#7effd4;white-space:nowrap;max-width:90%;text-align:center}
  #frame-bar-wrap{position:absolute;bottom:8px;left:8px;right:8px;height:6px;
    background:rgba(255,255,255,.15);border-radius:3px;overflow:hidden}
  #frame-bar{height:100%;width:0%;background:#38ef7d;transition:width .1s}
  #output-wrap{width:100%;max-width:700px;margin-top:1rem;background:#1a1a2e;
    border-radius:12px;padding:1rem;min-height:80px}
  #output-wrap label{color:#aaa;font-size:.8rem;margin-bottom:.4rem;display:block}
  #output{font-size:1.8rem;word-break:break-all;line-height:1.5;min-height:2.5rem}
  #word-list-wrap{width:100%;max-width:700px;margin-top:1rem;background:#1a1a2e;
    border-radius:12px;padding:1rem}
  #word-list-wrap label{color:#aaa;font-size:.8rem;margin-bottom:.6rem;display:block}
  #word-list{display:flex;flex-wrap:wrap;gap:.4rem}
  .word-tag{background:#11998e33;border:1px solid #11998e66;border-radius:20px;
    padding:3px 12px;font-size:.8rem;color:#38ef7d}
  .controls{width:100%;max-width:700px;display:flex;gap:.5rem;margin-top:.8rem;flex-wrap:wrap}
  button{flex:1;min-width:80px;padding:.6rem;border:none;border-radius:10px;
         font-size:.9rem;cursor:pointer;font-family:inherit}
  .btn-clear{background:#e74c3c;color:#fff}
  .btn-delete{background:#e67e22;color:#fff}
  #status{margin-top:.5rem;font-size:.75rem;color:#666}
  #loading{position:fixed;inset:0;background:#0f0f1a;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:1rem;z-index:100}
  .spinner{width:48px;height:48px;border:4px solid #333;border-top-color:#38ef7d;
    border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><p>카메라 초기화 중...</p></div>

<header>
  <a href="/">← 홈</a>
  <h1>💬 문장 모드</h1>
  <select id="res-select" onchange="changeResolution(this.value)">
    <option value="480">480p (권장)</option>
    <option value="720">720p (고화질)</option>
    <option value="240">240p (저사양)</option>
  </select>
</header>

<div id="video-wrap">
  <video id="video" playsinline autoplay muted></video>
  <canvas id="canvas"></canvas>
  <div id="live-label">손을 카메라에 보여주세요</div>
  <div id="frame-bar-wrap"><div id="frame-bar"></div></div>
</div>

<div id="output-wrap">
  <label>인식된 텍스트</label>
  <div id="output"></div>
</div>

<div id="word-list-wrap">
  <label>학습된 단어 목록</label>
  <div id="word-list">
    {% for label in seq_labels %}
    <span class="word-tag">{{ label }}</span>
    {% endfor %}
    {% if not seq_labels %}
    <span style="color:#666;font-size:.85rem">모델이 로드되지 않았습니다</span>
    {% endif %}
  </div>
</div>

<div class="controls">
  <button class="btn-delete" onclick="deleteLast()">← 삭제</button>
  <button class="btn-clear"  onclick="clearAll()">전체 삭제</button>
</div>
<div id="status">서버 연결 중...</div>

<!-- MediaPipe Holistic CDN -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js" crossorigin="anonymous"></script>
<!-- Socket.IO -->
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
const video     = document.getElementById('video');
const canvas    = document.getElementById('canvas');
const ctx       = canvas.getContext('2d');
const liveEl    = document.getElementById('live-label');
const outputEl  = document.getElementById('output');
const statusEl  = document.getElementById('status');
const loadingEl = document.getElementById('loading');
const frameBar  = document.getElementById('frame-bar');

const RES = { '240':[320,240], '480':[640,480], '720':[1280,720] };
let curRes = '480';
let camera = null;

const socket = io();
socket.on('connect',    () => statusEl.textContent = '✅ 서버 연결됨');
socket.on('disconnect', () => statusEl.textContent = '❌ 서버 연결 끊김');

let committed=[], frameCount=0;
const MAX_FRAMES=60;
let handVisible=false, handGoneTimer=null;
const HAND_GONE_MS=400;

function render(){ outputEl.textContent=committed.join(' '); }
function deleteLast(){ committed.pop(); render(); }
function clearAll(){ committed=[]; render(); }

socket.on('seq_result', (data) => {
  const {label, conf} = data;
  frameCount=0; frameBar.style.width='0%';
  if(label&&label!=='UNKNOWN'){
    liveEl.textContent=`✅ ${label}  (${(conf*100).toFixed(0)}%)`;
    committed.push(label); render();
  } else {
    liveEl.textContent='인식 실패 (신뢰도 낮음)';
  }
});

function endSequence(){
  if(handVisible){ handVisible=false; socket.emit('seq_end'); }
}

// MediaPipe Holistic
const holistic = new Holistic({locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${f}`});
holistic.setOptions({
  modelComplexity: 1,
  smoothLandmarks: true,
  minDetectionConfidence: 0.5,
  minTrackingConfidence: 0.5
});

holistic.onResults(results => {
  canvas.width=video.videoWidth; canvas.height=video.videoHeight;
  ctx.clearRect(0,0,canvas.width,canvas.height);

  const hasHand = results.leftHandLandmarks || results.rightHandLandmarks;

  if(hasHand){
    if(handGoneTimer){clearTimeout(handGoneTimer);handGoneTimer=null;}
    handVisible=true;

    // 손 그리기
    if(results.leftHandLandmarks){
      drawConnectors(ctx,results.leftHandLandmarks,HAND_CONNECTIONS,{color:'#38ef7d',lineWidth:2});
      drawLandmarks(ctx,results.leftHandLandmarks,{color:'#fff',lineWidth:1,radius:3});
    }
    if(results.rightHandLandmarks){
      drawConnectors(ctx,results.rightHandLandmarks,HAND_CONNECTIONS,{color:'#38ef7d',lineWidth:2});
      drawLandmarks(ctx,results.rightHandLandmarks,{color:'#fff',lineWidth:1,radius:3});
    }
    // 포즈 상체 그리기
    if(results.poseLandmarks){
      drawConnectors(ctx,results.poseLandmarks,POSE_CONNECTIONS,{color:'#44448888',lineWidth:1});
    }

    // 손 랜드마크 수집
    const lmList=[], hList=[];
    if(results.leftHandLandmarks){
      lmList.push(results.leftHandLandmarks.map(p=>({x:p.x,y:p.y,z:p.z})));
      hList.push('Left');
    }
    if(results.rightHandLandmarks){
      lmList.push(results.rightHandLandmarks.map(p=>({x:p.x,y:p.y,z:p.z})));
      hList.push('Right');
    }

    // 포즈/얼굴 랜드마크 수집
    const poseLm = results.poseLandmarks
      ? results.poseLandmarks.map(p=>({x:p.x,y:p.y,z:p.z})) : null;
    const faceLm = results.faceLandmarks
      ? results.faceLandmarks.map(p=>({x:p.x,y:p.y,z:p.z})) : null;

    socket.emit('seq_frame',{landmarks:lmList, handedness:hList,
                             pose_landmarks:poseLm, face_landmarks:faceLm});

    frameCount=Math.min(frameCount+1,MAX_FRAMES);
    frameBar.style.width=(frameCount/MAX_FRAMES*100)+'%';
    liveEl.textContent=`🔴 수집 중 (${frameCount}프레임)`;

  } else {
    if(handVisible&&!handGoneTimer){
      handGoneTimer=setTimeout(()=>{
        endSequence(); handGoneTimer=null;
        liveEl.textContent='손을 카메라에 보여주세요';
        frameBar.style.width='0%';
      },HAND_GONE_MS);
    }
  }
});

function startCamera(res){
  if(camera){ camera.stop(); camera=null; }
  const [w,h]=RES[res]||[640,480];
  camera=new Camera(video,{onFrame:async()=>{await holistic.send({image:video});},width:w,height:h});
  camera.start().then(()=>{
    loadingEl.style.display='none';
    statusEl.textContent=`카메라 ${w}x${h}`;
  });
}

function changeResolution(val){ curRes=val; startCamera(val); }

startCamera(curRes);
</script>
</body>
</html>
