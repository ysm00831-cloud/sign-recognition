<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수화 인식기</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#667eea">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="수화 인식기">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #0f0f1a;
    font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
    color: #fff;
  }
  h1 { font-size: 2rem; margin-bottom: 0.4rem; letter-spacing: 2px; }
  .sub { color: #888; margin-bottom: 3rem; font-size: 0.9rem; }
  .cards { display: flex; gap: 2rem; flex-wrap: wrap; justify-content: center; }
  .card {
    width: 200px; padding: 2.5rem 1.5rem;
    border-radius: 20px; text-align: center;
    cursor: pointer; text-decoration: none; color: #fff;
    transition: transform .2s, box-shadow .2s;
  }
  .card:hover { transform: translateY(-6px); box-shadow: 0 12px 30px rgba(0,0,0,.5); }
  .card.jamo     { background: linear-gradient(135deg,#667eea,#764ba2); }
  .card.sentence { background: linear-gradient(135deg,#11998e,#38ef7d); }
  .card .icon { font-size: 3rem; margin-bottom: 1rem; }
  .card h2    { font-size: 1.25rem; margin-bottom: .4rem; }
  .card p     { color: rgba(255,255,255,.75); font-size: .82rem; margin: 0; }
</style>
</head>
<body>
  <h1>✋ 수화 인식기</h1>
  <p class="sub">사용할 모드를 선택하세요</p>
  <div class="cards">
    <a href="jamo.html" class="card jamo">
      <div class="icon">🔤</div>
      <h2>자모 모드</h2>
      <p>ㄱ ㄴ ㄷ 자음·모음을<br>하나씩 인식합니다</p>
    </a>
    <a href="sentence.html" class="card sentence">
      <div class="icon">💬</div>
      <h2>문장 모드</h2>
      <p>단어·문장 동작을<br>시퀀스로 인식합니다</p>
    </a>
  </div>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
