name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Configure Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          echo '{
            "jdkPath": "${{ env.JAVA_HOME }}",
            "androidSdkPath": "${{ env.ANDROID_SDK_ROOT }}"
          }' > ~/.bubblewrap/config.json

      - name: Init TWA project
        run: |
          mkdir -p twa-build && cd twa-build
          cp ../twa-manifest.json .
          bubblewrap init --manifest https://ysm00831-cloud.github.io/sign-recognition/manifest.json --directory . 2>&1 || true

      - name: Create Keystore
        run: |
          cd twa-build
          keytool -genkey -v \
            -keystore android.keystore \
            -alias android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android123 \
            -keypass android123 \
            -dname "CN=SignSense, OU=App, O=SignSense, L=Seoul, ST=Seoul, C=KR"

      - name: Build APK
        run: |
          cd twa-build
          bubblewrap build --skipPwaValidation 2>&1

      - name: Find APK
        run: find . -name "*.apk" 2>/dev/null

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: signsense-apk
          path: |
            twa-build/**/*.apk
            twa-build/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
